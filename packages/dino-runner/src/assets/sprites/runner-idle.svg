<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 47" fill="currentColor" shape-rendering="crispEdges">
  <!-- head: snout + jaw, transparent eye + mouth (evenodd holes) -->
  <path fill-rule="evenodd" d="M26 2 H44 V13 H40 V18 H26 Z M38 5 H41 V8 H38 Z M30 14 H38 V16 H30 Z"/>
  <!-- neck -->
  <rect x="20" y="9" width="8" height="10"/>
  <!-- tail (backswept, tapering, angled up) -->
  <rect x="0" y="11" width="4" height="2"/>
  <rect x="0" y="13" width="8" height="3"/>
  <rect x="3" y="16" width="10" height="4"/>
  <!-- back / hump -->
  <rect x="9" y="14" width="14" height="4"/>
  <!-- body -->
  <rect x="5" y="18" width="22" height="13"/>
  <!-- belly -->
  <rect x="3" y="22" width="4" height="7"/>
  <!-- little forearm -->
  <rect x="23" y="22" width="6" height="3"/>
  <!-- legs (both planted) -->
  <rect x="9" y="31" width="6" height="13"/>
  <rect x="7" y="44" width="10" height="3"/>
  <rect x="18" y="31" width="6" height="13"/>
  <rect x="16" y="44" width="10" height="3"/>
</svg>
