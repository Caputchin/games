<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 12" fill="currentColor" shape-rendering="crispEdges" preserveAspectRatio="none">
  <!-- continuous baseline; the strip tiles at width 600 so two copies loop seamlessly -->
  <rect x="0" y="0" width="600" height="2"/>
  <!-- scattered pebbles / bumps below the line (kept clear of the 0 / 600 seam) -->
  <rect x="38" y="4" width="3" height="2"/>
  <rect x="96" y="5" width="2" height="2"/>
  <rect x="150" y="4" width="4" height="2"/>
  <rect x="214" y="6" width="2" height="2"/>
  <rect x="268" y="4" width="3" height="2"/>
  <rect x="330" y="5" width="2" height="2"/>
  <rect x="392" y="4" width="4" height="2"/>
  <rect x="455" y="6" width="2" height="2"/>
  <rect x="512" y="4" width="3" height="2"/>
  <rect x="560" y="5" width="2" height="2"/>
</svg>
