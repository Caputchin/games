# Voidshot deterministic sim. ONE clean wasm32-unknown-unknown cdylib serves both
# ends: the headless replay C-ABI (cap_alloc/cap_run via caputchin-replay-rs) AND
# the raw live-stepping C-ABI (live_*) the browser OGL driver calls. No
# wasm-bindgen, no imports, so the replay isolate instantiates it with empty imports.
#
# rapier3d is pinned to 0.22 because that exact version was determinism-spike
# verified this session (import-free wasm, run-to-run identical). A bump to a newer
# rapier3d must re-run that spike (clean import dump + selfcheck) before shipping.
[package]
name = "voidshot"
version = "0.1.0"
edition = "2021"
publish = false
description = "Voidshot deterministic rapier3d arena-shooter sim: headless replay + live stepping for an OGL renderer."

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
rapier3d = { version = "0.22", features = ["enhanced-determinism"] }
caputchin-replay-rs = "0.2"

# Size-tuned release profile for the shipped artifact.
[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true

# Fast local iteration (skip LTO + size pass). Never the published build.
[profile.fastdev]
inherits = "release"
opt-level = 1
lto = false
codegen-units = 16
strip = true
