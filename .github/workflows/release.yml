name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      leaf_memory_released: ${{ steps.release.outputs['packages/leaf-memory--release_created'] }}
      dino_runner_released: ${{ steps.release.outputs['packages/dino-runner--release_created'] }}
      fruit_slash_released: ${{ steps.release.outputs['packages/fruit-slash--release_created'] }}
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
          always-auth: true

      # Deterministic install (CI defaults to frozen anyway): the committed
      # pnpm-lock.yaml must already resolve every dep, including
      # @caputchin/game-sdk from the npm registry. Keep the lockfile in sync
      # whenever the SDK dep is bumped (release order: publish the SDK first,
      # then regen this lockfile). games has no intra-repo cross-deps, so a
      # release commit never drifts the lockfile.
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Publish @caputchin/game-leaf-memory
        if: ${{ needs.release-please.outputs.leaf_memory_released == 'true' }}
        run: pnpm --filter @caputchin/game-leaf-memory publish --access public --no-git-checks

      - name: Publish @caputchin/game-dino-runner
        if: ${{ needs.release-please.outputs.dino_runner_released == 'true' }}
        run: pnpm --filter @caputchin/game-dino-runner publish --access public --no-git-checks

      - name: Publish @caputchin/game-fruit-slash
        if: ${{ needs.release-please.outputs.fruit_slash_released == 'true' }}
        run: pnpm --filter @caputchin/game-fruit-slash publish --access public --no-git-checks
