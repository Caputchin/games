name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      # JSON array of the package paths that got a release this run, e.g.
      # ["packages/wall-smash"]. Drives the per-game publish matrix below.
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # One leg per RELEASED game: build + publish only that game, with only its
  # stack's toolchain. Clean-room -- no output cache, so every published artifact
  # is compiled fresh from source (a stale cache can never ship an immutable npm
  # version). Same game->stack convention as ci.yml's detect step.
  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' && needs.release-please.outputs.paths_released != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        path: ${{ fromJSON(needs.release-please.outputs.paths_released) }}
    name: "publish ${{ matrix.path }}"
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      # Resolve package name + stack from the released path (CI-owned convention:
      # Cargo.toml -> rust ; C/C++ engine source -> emscripten ; else js).
      - id: gameinfo
        run: |
          dir='${{ matrix.path }}'
          pkg="$(grep -m1 '"name"' "$dir/package.json" | sed -E 's/.*"name"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/')"
          if [ -f "$dir/Cargo.toml" ]; then
            stack=rust
          elif find "$dir" -name node_modules -prune -o \( -name '*.c' -o -name '*.cpp' \) -print 2>/dev/null | grep -q .; then
            stack=emscripten
          else
            stack=js
          fi
          echo "pkg=$pkg" >> "$GITHUB_OUTPUT"
          echo "stack=$stack" >> "$GITHUB_OUTPUT"
          echo "publish $dir -> pkg=$pkg stack=$stack"

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
          always-auth: true

      # Rust stack (e.g. wall-smash): cargo + wasm32 + wasm-bindgen (pinned to the
      # crate's version) + wasm-opt. No rust-cache here -- clean-room compile.
      - if: ${{ steps.gameinfo.outputs.stack == 'rust' }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - if: ${{ steps.gameinfo.outputs.stack == 'rust' }}
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@0.2.122,wasm-opt

      # Emscripten stack (e.g. phobos): emcc only (committed engine/wad/phobos.wad
      # keeps the WAD toolchain out).
      - if: ${{ steps.gameinfo.outputs.stack == 'emscripten' }}
        uses: mymindstorm/setup-emsdk@v14

      # Deterministic install. The committed pnpm-lock.yaml must resolve every dep
      # (incl. @caputchin/game-sdk from npm). Release order: publish the SDK first,
      # then regen this lockfile. games has no intra-repo cross-deps.
      - run: pnpm install --frozen-lockfile

      # build's prebuild generates the live + headless wasm; tsup bundles. Then
      # publish only this game.
      - run: pnpm --filter ${{ steps.gameinfo.outputs.pkg }} build
      - run: pnpm --filter ${{ steps.gameinfo.outputs.pkg }} publish --access public --no-git-checks
